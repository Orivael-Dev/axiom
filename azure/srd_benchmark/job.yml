# Azure ML command job — SRD benchmark sweep on a Tesla T4 node.
#   az ml job create -f azure/srd_benchmark/job.yml \
#       --resource-group <rg> --workspace-name <ws>
#
# A100 not in the subscription? T4 is fine for this work — perplexity is computed from
# the model's logits and is identical on any GPU; the A100 only buys speed and room for
# bigger models. T4 (16 GB) holds every model you'd quantize here, and is ~7x cheaper.
#
# SKU choice (set the name in `compute:` below):
#   • NC4as_T4_v3   — 1x T4 16 GB, ~$0.53/hr   ← default; sequential sweep, cheapest
#   • NC64as_T4_v3  — 4x T4 16 GB, ~$4.35/hr   ← run 4 model jobs in parallel (not pooled VRAM)
# Prereqs: an Azure ML workspace + an NCasT4_v3 compute target + T4 quota (Spot if available).
$schema: https://azuremlschemas.azureedge.net/latest/commandJob.schema.json

display_name: srd-create-and-benchmark
experiment_name: srd-quant
description: Create the SRD (.axm) per model, then WikiText-2 perplexity vs Q4_K_M (T4).

# Repo root is uploaded as the job's code.
code: ../..

# One job does everything: --create packs the SRD .axm (axm_cli pack --srd4,
# device_map=auto splits GPU+RAM so 7B fits a 16 GB T4) then benchmarks it. The ACPT
# image already ships torch, so it's NOT reinstalled here.
command: >-
  pip install -q transformers datasets accelerate sentencepiece bitsandbytes psutil &&
  python azure/srd_benchmark/run_sweep.py
  --create
  --models ${{inputs.models}}
  --out ${{outputs.results}}

# IMPORTANT: with --create, `models` must be **full HF repo ids** (axm_cli pack fetches
# them, and the bench script receives the same id — confirm yours resolves it). T4 = 16 GB
# VRAM, Turing cc 7.5: fp16/sdpa, no FlashAttention-2; ≤7B fp16 (device_map=auto), ≤13B
# quantized; 70B won't fit one T4. A wrong/oversized id just shows FAIL for that row —
# the sweep continues (incremental, eviction-safe).
inputs:
  models: "TinyLlama/TinyLlama-1.1B-Chat-v1.0 mistralai/Mistral-7B-Instruct-v0.3"

outputs:
  results:
    type: uri_folder
    mode: rw_mount

environment:
  # Curated PyTorch+CUDA image; CUDA 12.1 runs on T4. Swap for your registered env if any.
  image: mcr.microsoft.com/azureml/curated/acpt-pytorch-2.2-cuda12.1:latest

# Point this at your NCasT4_v3 compute target (NC4as_T4_v3 default; NC64as_T4_v3 for 4x).
compute: azureml:t4-spot

resources:
  instance_count: 1
