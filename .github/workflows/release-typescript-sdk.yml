name: release TypeScript SDK to npm

# Triggered by pushing a tag like `ts-sdk-v0.1.0`.
# Uses npm Trusted Publishing (provenance via OIDC) — no NPM_TOKEN needed
# once the package is configured for provenance.
# Until then, set NPM_TOKEN in repo secrets and the publish step falls
# back to it automatically.

on:
  push:
    tags: ["ts-sdk-v*"]

permissions:
  contents: read
  id-token: write   # required for OIDC + npm provenance

jobs:

  build-and-publish:
    name: build + publish (npm)
    runs-on: ubuntu-latest
    environment:
      name: npm
      url: https://www.npmjs.com/package/@axiom/firewall
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
          cache: npm
          cache-dependency-path: firewall_sdk/typescript/package-lock.json

      - name: Sanity check — tag matches package.json version
        working-directory: firewall_sdk/typescript
        run: |
          set -e
          TAG_VERSION="${GITHUB_REF_NAME#ts-sdk-v}"
          PKG_VERSION=$(node -p "require('./package.json').version")
          echo "tag        version: $TAG_VERSION"
          echo "package.json version: $PKG_VERSION"
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "::error::Tag ($TAG_VERSION) does not match package.json version ($PKG_VERSION)."
            exit 1
          fi

      - name: Install
        working-directory: firewall_sdk/typescript
        run: npm install

      - name: Typecheck + build + test
        working-directory: firewall_sdk/typescript
        run: |
          npm run typecheck
          npm run build
          npm test

      - name: Publish
        working-directory: firewall_sdk/typescript
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public --provenance
