<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Axiom · Intent Firewall{% endblock %}</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <header>
    <a href="/" class="brand">Axiom · Intent Firewall</a>
    <nav>
      {% if request.session.get('tenant_id') %}
        <a href="/dashboard">Dashboard</a>
        <a href="/dashboard/packs">Packs</a>
        <a href="/dashboard/policy">Policy</a>
        <a href="/help">Help</a>
        <a href="/billing">Billing</a>
        <form method="post" action="/logout" class="inline">
          <button type="submit" class="link">Log out</button>
        </form>
      {% else %}
        <a href="/help">Help</a>
        <a href="/login">Log in</a>
        <a href="/signup" class="cta">Sign up</a>
      {% endif %}
    </nav>
  </header>

  <main>
    {% block content %}{% endblock %}
  </main>

  <footer>
    <span>© 2026 Axiom · {{ brand_domain }}</span>
    <span><a href="/help">Docs</a></span>
  </footer>
</body>
</html>
