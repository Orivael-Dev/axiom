[build]
  publish = "docs"

# Root → benchmark lab (301 overrides index.html static file)
[[redirects]]
  from = "/"
  to = "/benchmark_lab.html"
  status = 301

# Clean URLs for the benchmark lab
[[redirects]]
  from = "/benchmark-lab"
  to = "/benchmark_lab.html"
  status = 200

[[redirects]]
  from = "/lab"
  to = "/benchmark_lab.html"
  status = 200

# Keep the constitutional AI page reachable at a clean URL
[[redirects]]
  from = "/constitutional-ai"
  to = "/constitutional_ai.html"
  status = 200
